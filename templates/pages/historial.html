<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='main.css') }}">

    <title>Historial</title>
</head>
<body>
    {% include 'pages/header.html' %}
    <div class="container">
      <h2 class="text-center" style="color: #fff;">Historial de Reclamos</h2>


      <div class="cards mt-4 mb-4 pb-4">
              <div class="card-side">
                <strong>{{barrio}}</strong> 
                <strong> N°: {{id}}</strong>

                <strong>{{fecha}}</strong>

              </div>
              <div class="card-main">
    
              <label>
                <strong>Nombre y Apellido: {{nombre}}</strong> 
              </label>
     
              <label>
                <strong>Calle: {{calle}} </strong> 
              </label>
 
              </div>
        
      </div>
    
      {% for historial_lista in historial_lista %}

      <div class="cards mt-4 mb-4">
        <div class="card-side">
          <strong> {{historial_lista[3]}}</strong>
        </div>
        <div class="card-main pb-4">
        <label>
          <strong>Detalles: {{historial_lista[2]}}</strong> 
        </label>
        </div>
        </div>
        {% endfor %}

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    {% include 'pages/footer.html' %}
  </body>

</html>
