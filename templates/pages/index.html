<!DOCTYPE html>
<html lang="en">
  <head>
    <style>
      .error-message {
        color: rgb(0, 0, 0);
      }
    </style>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
   <link
     href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
     rel="stylesheet"
   />
   <script>
     function showError() {
       var modal = new bootstrap.Modal(document.getElementById('errorModal'));
       modal.show();
     }
   </script>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ url_for('static', filename='main.css') }}"
    />
    <title>Document</title>
  </head>
  <body>
    
    {% if error %}
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        showError();
      });
    </script>
    {% endif %}
    <div class="modal" id="errorModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <img src="../../static/iconoerror.gif" alt="">
            <h5 class="modal-title" style="color:#d40000;">Error</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p class="error-message">Usuario o contraseña incorrectos. Intente nuevamente.</p>
          </div>
        </div>
      </div>
    </div>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">Alumbrado Publico Palpalá</a>
      </div>
    </nav>
    <div class="container">
      <h2 class="text-center pb-5" style="color:#fff;">Reclamos App</h2>
        <div class="cards">
          <form class="loginform" method="POST" action="/login">
            <div class="usuario">
              <label>Nombre de Usuario:</label>
              <input type="text" class="form-control" id="txtUsuario" name="txtUsuario">
            </div>
            <div class="contraseña">
              <label>Contraseña:</label>
              <input type="password" class="form-control" id="txtPassword" name="txtPassword">
            </div>
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button type="submit" class="btn btn-primary">Ingresar</button>
          </form>
        </div>
    </div>
    {% include 'pages/footer.html'%}
    
  </body>
</html>
