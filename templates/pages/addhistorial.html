<!DOCTYPE html>
<html lang="en">
<head>

    {% include 'pages/header.html'%}

    <div class="container pb-4">

        <div class="content cards">
            <form action="/addhistorial/guardar/{{id}}" class="formnuevo" method="post">
                  Historial:
                    <input type="text" class="form-control" id="txtHistorial" name="txtHistorial" placeholder="Descripcion de lo realizado">
                <div class="btns">
                    <button class="btn btn-success hecho" type="submit"><a>Realizado</a></button>
                    <a class="btn btn-danger" href="/pendientes" >Cancelar</a>

                </div>
            </form>
        </div>
    </div>
