<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link
    rel="stylesheet"
    type="text/css"
    href="{{ url_for('static', filename='main.css') }}"
  />
    <title>Editar Elemento</title>
</head>
<body>
    {% include 'pages/header.html'%}

    <div class="container">
        <h2 class="text-center pb-5" style="color:#Fff;">Editar Reclamo</h2>
        <div class="content cards">
            <form action="/edit/guardar/{{id}}" class="formnuevo" method="post">
                    Nombre y Apellido:
                    <input type="text" class="form-control" id="txtNyA" name="txtNyA" value="{{ nombre }}">
                    Calle:
                    <input type="text" class="form-control" id="txtCalle" name="txtCalle" value="{{ calle }}">
                    Barrio:
                    <input type="text" class="form-control" id="txtBarrio" name="txtBarrio" value="{{ barrio }}">
                    Problema:
                    <input type="text" class="form-control" id="txtProblema" name="txtProblema" value="{{ problema }}">
                    Historial:
                    <input type="text" class="form-control" id="txtHistorial" name="txtHistorial" value="{{ historial }}">
                <div class="btns">
                    <button class="btn btn-primary">Actualizar</button>
                    <a class="btn btn-danger" href="/" >Cancelar</a>

                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
</body>
{% include 'pages/footer.html' %}

</html>
