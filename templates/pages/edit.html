<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <title>Editar Elemento</title>
</head>
<body style="background-color: grey;">
    <div class="container pt-5">
        <form action="/edit/guardar/{{id}}" class="d-flex flex-column" method="post">
            <label for="txtNyA">
                Nombre y Apellido:
                <input type="text" class="form-control" id="txtNyA" name="txtNyA" value="{{ nombre }}">
            </label>
            <label for="txtCalle">
                Calle:
                <input type="text" class="form-control" id="txtCalle" name="txtCalle" value="{{ calle }}">
            </label>
            <label for="txtBarrio">
                Barrio:
                <input type="text" class="form-control" id="txtBarrio" name="txtBarrio" value="{{ barrio }}">
            </label>
            <label for="txtProblema">
                Problema:
                <input type="text" class="form-control" id="txtProblema" name="txtProblema" value="{{ problema }}"></input>
            </label>
            <button class="btn btn-primary mt-3">Actualizar</button>
        </form>
        <a class="btn btn-danger mt-3" href="/">Cancelar</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
</body>
</html>
